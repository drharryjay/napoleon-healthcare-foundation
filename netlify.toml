[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers applied to every response.
# The Content-Security-Policy allows Google Fonts (style-src/font-src) for the
# Inter/Literata typefaces loaded in src/styles/global.css, and permits
# form-action 'self' for the Netlify Forms POST submissions used by
# src/components/ContactForm.tsx. frame-ancestors 'none' blocks the site from
# being embedded in an iframe (clickjacking protection).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # Google Analytics (loaded only after cookie consent) needs googletagmanager
    # in script-src, and the google-analytics / analytics.google.com endpoints in
    # img-src and connect-src for its measurement beacons. Everything else stays
    # locked to 'self'.
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https://www.googletagmanager.com https://*.google-analytics.com; connect-src 'self' https://www.googletagmanager.com https://*.google-analytics.com https://*.analytics.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
